<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kapu Lockers – Locker Locations</title>

<style>
    body {
        margin: 0;
        font-family: "Helvetica Neue", Arial, sans-serif;
        background: #f5f5f5;
    }

    /* PAGE BACKGROUND */
    .page-wrapper {
        background: url('./images/palm-background.png') center/cover no-repeat;
        padding: 40px 20px;
        min-height: 100vh;
    }

    h1 {
        text-align: center;
        font-size: 2.2rem;
        margin-bottom: 40px;
        color: #004b6f;
        font-weight: 800;
    }

    /* LOCATION GRID */
    .location-grid {
        max-width: 900px;
        margin: auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        background: rgba(255,255,255,0.85);
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    /* MOBILE: collapse to 1 column */
    @media (max-width: 700px) {
        .location-grid {
            grid-template-columns: 1fr;
        }
    }

    /* LEFT COLUMN */
    .location-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .location-info a {
        font-size: 1.4rem;
        font-weight: 700;
        color: #0077cc;
        text-decoration: none;
        margin-bottom: 10px;
    }

    .location-info a:hover {
        text-decoration: underline;
    }

    .location-description {
        font-size: 1rem;
        color: #444;
        line-height: 1.5;
    }

    /* RIGHT COLUMN */
    .location-photo {
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        object-fit: cover;
    }
</style>
</head>

<body>

<div class="page-wrapper">

    <h1>Kapu Lockers – Locations</h1>

    <!-- LOCATION BLOCK -->
    <div class="location-grid">

        <!-- LEFT COLUMN -->
        <div class="location-info">
            <a href="https://maps.google.com/?q=21.45165,-158.19607" target="_blank">
                Wai'anae Small Boat Harbor
            </a>
            <div class="location-description">
               <a href="https://maps.google.com/?q=21.45165,-158.19607" style="font-size: 90%" target="_blank">
                85-491 Farrington Hwy, Waianae, HI 96792
                </a>
                <p>
                Adjacent to Dolphin Excursions and Honolulu Scuba
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div>
            <img src="./images/location-waianae.png" class="location-photo" alt="Wai‘anae Locker Location">
        </div>

    </div>

</div>

</body>
</html>
